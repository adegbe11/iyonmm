<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{ --ink:#12151A; --paper:#FAF8F2; --exposed:#FF5A1F; --cleared:#1E7A4C; --rule:#E6E1D6; --soft:#3D4350; }
  *{box-sizing:border-box;margin:0}
  body{font-family:system-ui,sans-serif;width:360px;background:var(--paper);color:var(--ink);font-size:13px}
  header{background:var(--ink);color:var(--paper);padding:12px 14px}
  header b{font-weight:800;font-size:15px}
  header b span{color:var(--exposed)}
  header p{color:#B9BDC7;font-size:11px;margin-top:2px}
  .pad{padding:12px 14px}
  label{display:block;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--soft);margin:8px 0 3px}
  input{width:100%;padding:7px 9px;border:1px solid var(--rule);background:#fff;font-size:13px}
  .row{display:flex;gap:8px}
  .row>div{flex:1}
  .toggle{display:flex;align-items:center;gap:7px;margin:12px 0;font-size:12px;color:var(--soft)}
  .count{font-size:11px;color:var(--soft);margin:10px 0 4px}
  .brokers{max-height:150px;overflow:auto;border:1px solid var(--rule);background:#fff;padding:6px}
  .brokers label{display:flex;align-items:center;gap:7px;text-transform:none;letter-spacing:0;font-size:12px;color:var(--ink);margin:0;padding:3px 2px;cursor:pointer}
  .brokers input{width:auto}
  .actions{display:flex;gap:8px;margin-top:12px}
  button{font-family:inherit;font-weight:700;font-size:13px;padding:10px;border:2px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;flex:1}
  button.ghost{background:transparent;color:var(--ink)}
  button.go{background:var(--exposed);border-color:var(--exposed);color:#fff}
  .note{font-size:10.5px;color:var(--soft);margin-top:10px;line-height:1.45}
  .ok{color:var(--cleared);font-weight:700}
</style>
</head>
<body>
  <header><b>erasa<span>.</span> removal assistant</b><p>Your details stay in this browser. Never uploaded.</p></header>
  <div class="pad">
    <div class="row">
      <div><label>First name</label><input id="firstName" autocomplete="off"></div>
      <div><label>Last name</label><input id="lastName" autocomplete="off"></div>
    </div>
    <label>Email</label><input id="email" type="email" autocomplete="off">
    <div class="row">
      <div><label>Phone</label><input id="phone" autocomplete="off"></div>
      <div><label>City</label><input id="city" autocomplete="off"></div>
    </div>
    <div class="row">
      <div><label>State</label><input id="state" autocomplete="off"></div>
      <div><label>ZIP</label><input id="zip" autocomplete="off"></div>
    </div>
    <label>Street address</label><input id="address" autocomplete="off">

    <label class="toggle"><input type="checkbox" id="autosubmit" checked> Auto-submit when no CAPTCHA is detected</label>

    <div class="count" id="count"></div>
    <div class="brokers" id="brokers"></div>

    <div class="actions">
      <button class="ghost" id="save">Save details</button>
      <button class="go" id="start">Start removal</button>
    </div>
    <div class="note" id="note">Click Start: each broker opens in a tab with your details filled in. Solve any CAPTCHA or email verification, then submit. Nothing you type here is ever sent to a server.</div>
  </div>
  <script src="brokers.js"></script>
  <script src="popup.js"></script>
</body>
</html>
